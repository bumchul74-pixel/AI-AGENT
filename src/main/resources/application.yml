spring:
  application:
    name: AI-AGENT
  ai:
    mcp:
      client:
        enabled: ${MCP_CLIENT_ENABLED:true}
        name: ai-agent-mcp-client
        version: 1.0.0
        request-timeout: 20s
        type: SYNC
        streamable-http:
          connections:
            ai-mcp:
              url: ${AI_MCP_BASE_URL:http://localhost:8092}
              endpoint: ${AI_MCP_ENDPOINT:/mcp}
        stdio:
          connections:
            server-filesystem:
              command: ${MCP_FILESYSTEM_COMMAND:npx.cmd}
              args:
                - -y
                - ${MCP_FILESYSTEM_PACKAGE:@modelcontextprotocol/server-filesystem}
                - ${MCP_FILESYSTEM_ROOT:d:\workspace\AI-AGENT}

generation:
  project-structures:
    - name: Management Old Module
      value: 'D:\workspace\management'
    - name: Extension Module
      value: 'D:\workspace\extension'
server:
  port: 8081

llm:
  provider: ${LLM_PROVIDER:gemini}

openai:
  api-key: ${OPENAI_API_KEY:}
  model: gpt-5
  base-url: https://api.openai.com/v1
  ssl:
    trust-all: ${OPENAI_SSL_TRUST_ALL:true}

gemini:
  api-key: ${GEMINI_API_KEY:AIzaSyDJlKgdDupnrzO4V5zc5VcQF0uWhddeh0M}
  model: ${GEMINI_MODEL:gemini-2.5-flash}
  base-url: ${GEMINI_BASE_URL:https://generativelanguage.googleapis.com}

rag:
  base-url: ${RAG_SERVER_BASE_URL:http://localhost:8000}
  search-path: /api/search
  top-k: ${RAG_SEARCH_TOP_K:5}
  watch:
    enabled: ${RAG_WATCH_ENABLED:true}
    directory: ${RAG_WATCH_DIR:rag-server/inbox}
    interval-seconds: ${RAG_WATCH_INTERVAL_SECONDS:30}
    source: ${RAG_WATCH_SOURCE:backend-source}
    chunk-size: ${RAG_CHUNK_SIZE:1200}
    overlap: ${RAG_CHUNK_OVERLAP:150}
    min-file-age-seconds: ${RAG_WATCH_MIN_FILE_AGE_SECONDS:2}
